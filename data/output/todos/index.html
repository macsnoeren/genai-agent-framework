<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Master Overzicht</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        .todo-card:hover .bron-badge { opacity: 1; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen font-sans">

    <!-- Gefeliciteerd Overlay -->
    <div id="congrats-msg" class="hidden fixed inset-0 flex items-center justify-center bg-slate-900/50 backdrop-blur-sm z-50 px-6">
        <div class="bg-white p-8 rounded-3xl shadow-2xl text-center max-w-sm">
            <h2 class="text-4xl font-black text-indigo-700 mb-2 leading-tight">Gefeliciteerd! 🎉</h2>
            <p class="text-slate-500 font-medium">Alle taken zijn voltooid. Tijd voor ontspanning!</p>
            <button onclick="document.getElementById('congrats-msg').classList.add('hidden')" class="mt-8 bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-2xl font-black shadow-lg shadow-indigo-100 transition-all">
                Lekker bezig!
            </button>
        </div>
    </div>

    <div class="max-w-4xl mx-auto py-12 px-6">
        <header class="mb-12 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-black text-indigo-700 tracking-tight">Todo Master</h1>
                <p class="text-slate-500 mt-1 font-medium">Centraal overzicht van geaggregeerde taken</p>
            </div>
            <div class="text-right flex space-x-2">
                <button id="save-btn" onclick="saveTodos()" class="hidden bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-bold transition-all shadow-lg shadow-emerald-200">
                    Wijzigingen Opslaan
                </button>
                <button onclick="loadTodos()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-bold transition-all shadow-lg shadow-indigo-200">
                    Vernieuwen
                </button>
            </div>
        </header>

        <div id="todo-container" class="grid gap-6">
            <!-- Loading state -->
            <div class="flex justify-center items-center py-20">
                <div class="animate-spin rounded-full h-10 w-10 border-4 border-indigo-200 border-t-indigo-600"></div>
            </div>
        </div>
    </div>

    <script>
        let allItems = [];
        let saveTimeout = null;
        let celebrated = false;

        function showSaveButton() {
            const btn = document.getElementById('save-btn');
            if (saveTimeout) {
                clearTimeout(saveTimeout);
                saveTimeout = null;
            }
            btn.innerText = 'Wijzigingen Opslaan';
            btn.classList.remove('hidden');
        }

        async function loadTodos() {
            const container = document.getElementById('todo-container');
            
            try {
                // Pad naar de verzamelbak relatief aan de web folder
                const response = await fetch('todo_master_list.jsonl');
                if (!response.ok) throw new Error('Kon het JSONL bestand niet laden. Draai je een lokale server?');
                
                const text = await response.text();
                const lines = text.trim().replace(/}\s*{/g, '}\n{').split('\n').filter(l => l.trim());
                
                const oneMonthAgo = new Date();
                oneMonthAgo.setDate(oneMonthAgo.getDate() - 30);

                container.innerHTML = '';

                if (lines.length === 0) {
                    container.innerHTML = '<div class="text-center py-20 text-slate-400 italic">Geen taken gevonden.</div>';
                    return;
                }

                // Verzamel alle individuele taken van alle bronnen
                allItems = [];
                lines.forEach(line => {
                    const data = JSON.parse(line);
                    const taskDate = new Date(data.datum);
                    
                    data.items.forEach(item => {
                        const taskObj = typeof item === 'string' ? { taak: item, prioriteit: 'normaal', status: 'open' } : item;
                        if (!taskObj.status) taskObj.status = 'open';
                        
                        // Filter oude 'done' items (ouder dan 1 maand)
                        if (taskObj.status === 'done' && taskDate < oneMonthAgo) {
                            return;
                        }

                        allItems.push({ ...taskObj, bron: data.bron, datum: data.datum });
                    });
                });

                // Sorteer: Done naar beneden, Hoog eerst, daarna op datum
                allItems.sort((a, b) => {
                    if (a.status === 'done' && b.status !== 'done') return 1;
                    if (a.status !== 'done' && b.status === 'done') return -1;
                    if (a.prioriteit === 'hoog' && b.prioriteit !== 'hoog') return -1;
                    if (a.prioriteit !== 'hoog' && b.prioriteit === 'hoog') return 1;
                    return new Date(b.datum) - new Date(a.datum);
                });

                document.getElementById('save-btn').classList.add('hidden');
                renderList(allItems, container);

            } catch (err) {
                container.innerHTML = `
                    <div class="bg-white border-2 border-red-100 p-8 rounded-2xl text-center">
                        <div class="text-red-500 font-bold text-lg mb-2">Toegang geweigerd of bestand niet gevonden</div>
                        <p class="text-slate-500 text-sm">Zorg dat je een lokale webserver draait (bv: <code>python -m http.server</code>) in de project root.</p>
                        <p class="mt-4 text-xs text-slate-400 font-mono">${err.message}</p>
                    </div>`;
            }
        }

        function toggleTask(index) {
            allItems[index].status = allItems[index].status === 'done' ? 'open' : 'done';
            renderList(allItems, document.getElementById('todo-container'));
            saveTodos();
        }

        function togglePriority(index, event) {
            event.stopPropagation(); // Voorkom dat toggleTask wordt aangeroepen
            allItems[index].prioriteit = allItems[index].prioriteit === 'hoog' ? 'normaal' : 'hoog';
            loadTodosFromMemory();
            saveTodos();
        }

        async function saveTodos() {
            const btn = document.getElementById('save-btn');
            btn.classList.remove('hidden');
            if (saveTimeout) {
                clearTimeout(saveTimeout);
                saveTimeout = null;
            }
            btn.innerText = 'Bezig met opslaan...';
            
            // Groepeer terug naar JSONL formaat
            const grouped = {};
            allItems.forEach(item => {
                const key = `${item.bron}|${item.datum}`;
                if (!grouped[key]) grouped[key] = { datum: item.datum, bron: item.bron, items: [] };
                grouped[key].items.push({ taak: item.taak, prioriteit: item.prioriteit, status: item.status });
            });
            
            const jsonl = Object.values(grouped).map(g => JSON.stringify(g)).join('\n') + '\n';
            
            try {
                const res = await fetch('/save-todos', {
                    method: 'POST',
                    body: jsonl
                });
                if (res.ok) {
                    btn.innerText = 'Opgeslagen!';
                    saveTimeout = setTimeout(() => {
                        btn.classList.add('hidden');
                        saveTimeout = null;
                    }, 2000);
                }
            } catch (err) {
                alert('Fout bij opslaan: ' + err.message);
            }
        }

        function loadTodosFromMemory() {
            const container = document.getElementById('todo-container');
            // Opnieuw sorteren bij geheugen-update
            allItems.sort((a, b) => {
                if (a.status === 'done' && b.status !== 'done') return 1;
                if (a.status !== 'done' && b.status === 'done') return -1;
                if (a.prioriteit === 'hoog' && b.prioriteit !== 'hoog') return -1;
                if (a.prioriteit !== 'hoog' && b.prioriteit === 'hoog') return 1;
                return new Date(b.datum) - new Date(a.datum);
            });
            renderList(allItems, container);
        }

        function renderList(items, container) {
            // Check of alles gedaan is voor confetti
            if (items.length > 0 && items.every(item => item.status === 'done')) {
                if (!celebrated) {
                    celebrated = true;
                    document.getElementById('congrats-msg').classList.remove('hidden');
                    confetti({
                        particleCount: 150,
                        spread: 70,
                        origin: { y: 0.6 }
                    });
                }
            } else {
                celebrated = false;
            }

            container.innerHTML = '';
            const wrapper = document.createElement('div');
            wrapper.className = 'bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden';

            const itemsHtml = items.map((item, index) => `
                <div onclick="toggleTask(${index})" class="group flex items-start px-6 py-4 border-b border-slate-50 last:border-0 hover:bg-slate-50 transition-colors cursor-pointer">
                    <div class="h-6 w-6 rounded-full border-2 flex items-center justify-center mr-4 flex-shrink-0 transition-all ${item.status === 'done' ? 'bg-emerald-500 border-emerald-500' : (item.prioriteit === 'hoog' ? 'border-red-400' : 'border-slate-300')}">
                        ${item.status === 'done' ? '<svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>' : ''}
                    </div>
                    <div class="flex-grow">
                        <div class="flex items-center space-x-2">
                            <span class="text-slate-700 font-semibold ${item.status === 'done' ? 'line-through text-slate-400' : (item.prioriteit === 'hoog' ? 'text-red-700' : '')}">${item.taak}</span>
                            ${item.prioriteit === 'hoog' && item.status !== 'done' ? '<span class="bg-red-100 text-red-600 text-[9px] px-1.5 py-0.5 rounded font-black uppercase">Urgent</span>' : ''}
                        </div>
                        <div class="flex items-center mt-1 space-x-2 text-[10px] font-bold text-slate-400 uppercase tracking-wider">
                            <span>${item.bron}</span>
                            <span>•</span>
                            <span>${item.datum}</span>
                        </div>
                    </div>
                    <button onclick="togglePriority(${index}, event)" class="ml-4 p-2 rounded-full hover:bg-slate-100 transition-colors ${item.status === 'done' ? 'hidden' : ''}">
                        <svg class="w-5 h-5 ${item.prioriteit === 'hoog' ? 'text-red-500' : 'text-slate-300'}" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path>
                        </svg>
                    </button>
                </div>
            `).join('');

            wrapper.innerHTML = itemsHtml;
            container.appendChild(wrapper);
        }

        // Initiele laad actie
        loadTodos();
    </script>
</body>
</html>
